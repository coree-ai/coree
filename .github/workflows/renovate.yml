name: Renovate Plugin Pins

on:
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - antigravity
          - claude
          - codex
          - cursor
          - gemini
          - jetbrains
          - kiro
          - openclaw
          - opencode
          - vscode
          - windsurf
          - zed
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.COREE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COREE_BOT_PRIVATE_KEY }}
          owner: coree-ai
          repositories: ${{ matrix.repo }}

      - uses: actions/checkout@v6
        with:
          repository: coree-ai/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Run Renovate
        run: npx renovate
        env:
          RENOVATE_TOKEN: ${{ steps.app-token.outputs.token }}
          LOG_LEVEL: info
