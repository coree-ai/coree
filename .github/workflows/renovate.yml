name: Renovate Plugin Pins

on:
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - antigravity
          - claude
          - codex
          - gemini
          - openclaw
          - opencode
          - zed
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.COREE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COREE_BOT_PRIVATE_KEY }}
          owner: coree-ai
          repositories: ${{ matrix.repo }}

      - uses: actions/checkout@v6
        with:
          repository: coree-ai/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}

      - uses: renovatebot/github-action@v46.1.15
        with:
          token: ${{ steps.app-token.outputs.token }}
          renovate-version: full
        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: coree-ai/${{ matrix.repo }}
          # Allow the postUpgradeTasks command (lockfile + plugin own-version regen)
          RENOVATE_ALLOWED_COMMANDS: '["^node scripts/renovate-post-upgrade\\.mjs .+$"]'
