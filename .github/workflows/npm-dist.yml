name: NPM distribution

# Verifies the npm packaging path end-to-end by downloading directly from the
# npm registry - no binary build needed. Tests what a real user experiences:
#   1. npx resolves the platform binary via optionalDependencies
#   2. bin/coree Node.js launcher executes correctly
#   3. coree --version, inject, and MCP initialize handshake all pass
#
# Complementary to E2E, which tests the raw binary directly and ignores npm/**.

on:
  # Run after Release workflow publishes to npm (packages must exist before testing).
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  pull_request:
    paths:
      - 'npm/**'
      - 'scripts/test-dist.sh'

jobs:
  test-dist:
    name: NPM dist (linux-x64)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run distribution test
        run: bash scripts/test-dist.sh
