name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: coree-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: coree-linux-aarch64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: coree-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: coree-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release coree

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target\${{ matrix.target }}\release\coree.exe -DestinationPath ${{ matrix.artifact }}

      - uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [release]
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Extract artifacts
        run: |
          cd dist
          for f in *.tar.gz; do
            tar xzf "$f"
            mv coree "${f%.tar.gz}"
          done
          for f in *.zip; do
            unzip -o "$f"
            mv coree.exe "${f%.zip}.exe"
          done

      - name: Check if model package version is new
        id: model-check
        run: |
          VERSION=$(node -p "require('./npm/@coree-ai/coree-model-bge-small-en-v1.5/package.json').version")
          if npm view "@coree-ai/coree-model-bge-small-en-v1.5@${VERSION}" version 2>/dev/null; then
            echo "new=false" >> $GITHUB_OUTPUT
          else
            echo "new=true" >> $GITHUB_OUTPUT
          fi

      - name: Fetch embedding model
        if: steps.model-check.outputs.new == 'true'
        run: |
          pip install huggingface_hub --quiet
          python3 scripts/fetch-model.py dist/model

      - name: Generate npm packages
        run: node scripts/generate-npm-packages.mjs

      - name: Bundle model
        if: steps.model-check.outputs.new == 'true'
        run: node scripts/bundle-model.mjs

      - name: Publish model package
        if: steps.model-check.outputs.new == 'true'
        run: npm publish npm/@coree-ai/coree-model-bge-small-en-v1.5 --access public --provenance

      - name: Publish platform packages
        run: |
          for pkg in npm/@coree-ai/coree-linux-x64 npm/@coree-ai/coree-linux-arm64 npm/@coree-ai/coree-darwin-arm64 npm/@coree-ai/coree-win32-x64; do
            npm publish "$pkg" --access public --provenance
          done

      - name: Publish main package
        run: npm publish npm/@coree-ai/coree --access public --provenance
