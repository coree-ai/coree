name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: coree-linux-x86_64.tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: coree-linux-aarch64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: coree-macos-aarch64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: coree-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v6

      # macos-latest's default Xcode (16.4) intermittently ships an incomplete
      # clang toolchain, so rustc's -nodefaultlibs link of libclang_rt.osx fails
      # with "ld: library 'clang_rt.osx' not found". Pin an explicit known-good
      # Xcode: 'latest-stable' is non-deterministic - it resolved to a 26.6 RC on
      # some runners, which left xcode-select falling back to the broken 16.4
      # toolchain. 26.3 links clean. No-op on non-macOS legs.
      - name: Pin Xcode (macOS)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.artifact }} -C target/${{ matrix.target }}/release coree

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path target\${{ matrix.target }}\release\coree.exe -DestinationPath ${{ matrix.artifact }}

      - uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish-npm:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: [release]
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Extract artifacts
        run: |
          cd dist
          for f in *.tar.gz; do
            tar xzf "$f"
            mv coree "${f%.tar.gz}"
          done
          for f in *.zip; do
            unzip -o "$f"
            mv coree.exe "${f%.zip}.exe"
          done

      - name: Generate npm packages
        run: node scripts/generate-npm-packages.mjs

      - name: Publish platform packages
        run: |
          for pkg in npm/@coree-ai/coree-linux-x64 npm/@coree-ai/coree-linux-arm64 npm/@coree-ai/coree-darwin-arm64 npm/@coree-ai/coree-win32-x64; do
            npm publish "$pkg" --access public --provenance
          done

      - name: Publish main package
        run: npm publish npm/@coree-ai/coree --access public --provenance

  build-web:
    name: Build website
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Zola
        run: |
          ZOLA_VERSION="0.22.1"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin

      - name: Copy logo to web static
        run: cp assets/logo.svg web/static/logo.svg

      - name: Build
        run: zola build
        working-directory: web

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/public

  deploy-web:
    name: Deploy website
    needs: build-web
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  resolve-version:
    name: Resolve released version
    runs-on: ubuntu-latest
    needs: [publish-npm]
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  propagate:
    name: Propagate pin to plugin repos
    needs: [resolve-version]
    uses: ./.github/workflows/propagate.yml
    secrets: inherit
    with:
      coree_version: ${{ needs.resolve-version.outputs.version }}
