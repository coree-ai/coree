name: Model Package

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/fetch-model.py'
      - 'npm/@coree-ai/coree-model-bge-small-en-v1.5/**'

jobs:
  pack-model-dev:
    name: Pack model package (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Ensure dev release exists
        run: |
          gh release view dev --repo ${{ github.repository }} \
            || gh release create dev \
                 --prerelease \
                 --title "Dev builds (main branch)" \
                 --notes "Automatically updated on every push to main." \
                 --repo ${{ github.repository }} \
            || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch embedding model
        run: |
          pip install huggingface_hub --quiet
          python3 scripts/fetch-model.py dist/model

      - name: Bundle model
        run: node scripts/bundle-model.mjs

      - name: Pack model package
        run: npm pack npm/@coree-ai/coree-model-bge-small-en-v1.5 --pack-destination dist/

      - name: Upload to dev release
        run: gh release upload dev dist/coree-ai-coree-model-*.tgz --clobber --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
