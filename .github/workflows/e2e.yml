name: E2E

# Verifies the full binary on every target platform:
#   1. Build release binary
#   2. `coree --version` and `coree status` smoke tests
#   3. Inject state and MCP store + search E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'agents/**'
      - 'npm/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'agents/**'
      - 'npm/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: coree-linux-x86_64.tar.gz
            binary: coree
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: coree-linux-aarch64.tar.gz
            binary: coree
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: coree-macos-aarch64.tar.gz
            binary: coree
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: coree-windows-x86_64.zip
            binary: coree.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set binary path
        shell: bash
        run: |
          echo "COREE_BIN=$GITHUB_WORKSPACE/target/${{ matrix.target }}/release/${{ matrix.binary }}" >> "$GITHUB_ENV"

      - name: Binary - version
        shell: bash
        run: |
          "$COREE_BIN" --version

      - name: Binary - status (DB open, migrations, query)
        shell: bash
        run: |
          SMOKE_DIR="$RUNNER_TEMP/smoke"
          mkdir -p "$SMOKE_DIR"
          printf 'project_id = "e2e-smoke"\n' > "$SMOKE_DIR/.coree.toml"
          (cd "$SMOKE_DIR" && "$COREE_BIN" status)

      # Deterministic inject state tests - manipulate serve.lock / serve.ready
      # directly instead of racing against the model download window.
      - name: Inject - loading and ready state messages
        shell: bash
        run: python3 scripts/test_inject_states.py "$COREE_BIN"

      - name: Binary - MCP store + search
        shell: bash
        run: python3 scripts/e2e_mcp.py "$COREE_BIN"
