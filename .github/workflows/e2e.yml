name: E2E

# Verifies the full binary on every target platform:
#   1. Build release binary
#   2. `coree --version` and `coree status` smoke tests
#   3. Inject state and MCP store + search E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'npm/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'npm/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: coree-linux-x86_64.tar.gz
            binary: coree
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: coree-linux-aarch64.tar.gz
            binary: coree
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: coree-macos-aarch64.tar.gz
            binary: coree
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: coree-windows-x86_64.zip
            binary: coree.exe

    steps:
      - uses: actions/checkout@v6

      # macos-latest's default Xcode (16.4) intermittently ships an incomplete
      # clang toolchain, so rustc's -nodefaultlibs link of libclang_rt.osx fails
      # with "ld: library 'clang_rt.osx' not found". rustc's clang is an xcrun
      # trampoline selected by DEVELOPER_DIR (not MD_APPLE_SDK_ROOT, which is why
      # setup-xcode did not help). Point DEVELOPER_DIR at a complete Xcode and
      # log the resolved toolchain. No-op on non-macOS legs.
      - name: Select Xcode toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          export DEVELOPER_DIR=/Applications/Xcode_26.3.app/Contents/Developer
          echo "DEVELOPER_DIR=$DEVELOPER_DIR" >> "$GITHUB_ENV"
          # Key rust-cache on the actual C toolchain so any future Xcode/clang
          # change auto-invalidates it (a stale cache bakes the old compiler-rt
          # -L path and breaks the link even when the new toolchain is correct).
          echo "XCODE_CACHE_KEY=$(xcrun clang --version | shasum | cut -c1-12)" >> "$GITHUB_ENV"
          echo "xcode-select -p: $(xcode-select -p)"
          echo "xcrun clang:     $(xcrun -f clang)"
          RES="$(xcrun clang -print-resource-dir)"
          echo "resource-dir:    $RES"
          ls -l "$RES/lib/darwin/libclang_rt.osx.a" || echo "MISSING libclang_rt.osx.a"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-${{ matrix.target }}-xc${{ env.XCODE_CACHE_KEY }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Set binary path
        shell: bash
        run: |
          echo "COREE_BIN=$GITHUB_WORKSPACE/target/${{ matrix.target }}/release/${{ matrix.binary }}" >> "$GITHUB_ENV"

      - name: Binary - version
        shell: bash
        run: |
          "$COREE_BIN" --version

      - name: Binary - status (DB open, migrations, query)
        shell: bash
        run: |
          SMOKE_DIR="$RUNNER_TEMP/smoke"
          mkdir -p "$SMOKE_DIR"
          printf 'project_id = "e2e-smoke"\n' > "$SMOKE_DIR/.coree.toml"
          (cd "$SMOKE_DIR" && "$COREE_BIN" status)

      # Deterministic inject state tests - manipulate serve.lock / serve.ready
      # directly instead of racing against the model download window.
      - name: Inject - loading and ready state messages
        shell: bash
        run: python3 scripts/test_inject_states.py "$COREE_BIN"

      - name: Binary - MCP store + search
        shell: bash
        run: python3 scripts/e2e_mcp.py "$COREE_BIN"
