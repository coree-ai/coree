name: Bump Dependent Plugin Repos

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'coree version to propagate (e.g. 0.14.0)'
        required: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [claude, codex, cursor, gemini, jetbrains, kiro, openclaw, opencode, vscode, windsurf, zed]
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          client-id: ${{ vars.COREE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.COREE_BOT_PRIVATE_KEY }}
          owner: coree-ai
          repositories: ${{ matrix.repo }}
      - uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'coree-ai',
              repo: '${{ matrix.repo }}',
              workflow_id: 'bump.yml',
              ref: 'main',
              inputs: { coree_version: '${{ inputs.version }}' }
            })
