name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'npm/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'npm/**'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  biome:
    name: Biome (lint + format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Biome CI
        run: npx @biomejs/biome ci scripts/

  # Validate shared scripts with node --check and node --test.
  scripts:
    name: Scripts (node --check + node:test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Node syntax check
        run: node --check scripts/*.mjs

      - name: Node tests
        run: node --test scripts/propagate-coree-pin.test.mjs

  # Run tests and clippy on Linux. This is the fast feedback job.
  test:
    name: Test (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

  # Build-only checks for the other platforms agents run on.
  # Tests require the fastembed ONNX runtime which is downloaded at build time;
  # a full test run on every platform would be slow and hit network rate limits.
  # A successful build confirms linkage, dependencies, and platform compatibility.
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest       # Linux x86_64 (most common deployment target)
            target: x86_64-unknown-linux-gnu
            binary: coree
          - os: macos-latest        # Apple Silicon (arm64)
            target: aarch64-apple-darwin
            binary: coree
          - os: ubuntu-24.04-arm   # Linux ARM64 (Graviton, Raspberry Pi, etc.)
            target: aarch64-unknown-linux-gnu
            binary: coree
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: coree.exe
          - os: windows-latest      # Copilot+ PCs / Snapdragon X - cross-compile from x86_64
            target: aarch64-pc-windows-msvc
            binary: coree.exe

    steps:
      - uses: actions/checkout@v6

      # macos-latest's default Xcode (16.4) intermittently ships an incomplete
      # clang toolchain on the runner image, so rustc's -nodefaultlibs link of
      # libclang_rt.osx fails ~half the time. Pin a known-good Xcode for a
      # deterministic toolchain. No-op on non-macOS legs.
      - name: Pin Xcode (macOS)
        if: runner.os == 'macOS'
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: coree-debug-${{ matrix.target }}
          path: target/${{ matrix.target }}/debug/${{ matrix.binary }}
          retention-days: 30
